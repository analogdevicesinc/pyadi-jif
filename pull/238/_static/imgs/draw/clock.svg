<svg xmlns="http://www.w3.org/2000/svg" width="560" height="340" viewBox="0 0 560 340">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <filter id="sh" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#94a3b8" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="560" height="340" fill="#f8fafc"/>

  <!-- Clock Chip outer box -->
  <rect x="80" y="10" width="400" height="258" rx="12"
        fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#sh)"/>

  <!-- Header band (rounded top corners, flat bottom) -->
  <path d="M 80 42 L 80 22 Q 80 10 92 10 L 468 10 Q 480 10 480 22 L 480 42 Z"
        fill="#3b82f6"/>
  <text x="280" y="30" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#ffffff" letter-spacing="1">CLOCK CHIP</text>

  <!-- Divider line between header and body -->
  <line x1="80" y1="42" x2="480" y2="42" stroke="#3b82f6" stroke-width="2"/>

  <!-- PLL 1 -->
  <rect x="130" y="52" width="190" height="52" rx="8"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="225" y="83" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#1e3a8a">PLL 1</text>

  <!-- PLL 2 -->
  <rect x="130" y="138" width="190" height="52" rx="8"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="225" y="169" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#1e3a8a">PLL 2</text>

  <!-- Output divider blocks (D0–D4) -->
  <!-- Centers: 125, 192, 259, 326, 393 -->
  <rect x="94"  y="218" width="62" height="32" rx="6"
        fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="125" y="238" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#065f46">&#247; D0</text>

  <rect x="161" y="218" width="62" height="32" rx="6"
        fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="192" y="238" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#065f46">&#247; D1</text>

  <rect x="228" y="218" width="62" height="32" rx="6"
        fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="259" y="238" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#065f46">&#247; D2</text>

  <rect x="295" y="218" width="62" height="32" rx="6"
        fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="326" y="238" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#065f46">&#247; D3</text>

  <rect x="362" y="218" width="62" height="32" rx="6"
        fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="393" y="238" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#065f46">&#247; D4</text>

  <!-- REF block (left, external) -->
  <rect x="4" y="57" width="68" height="34" rx="8"
        fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5" filter="url(#sh)"/>
  <text x="38" y="78" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#6b21a8">REF</text>

  <!-- VCXO block (right, external) -->
  <rect x="488" y="148" width="68" height="34" rx="8"
        fill="#fef9c3" stroke="#eab308" stroke-width="1.5" filter="url(#sh)"/>
  <text x="522" y="169" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#854d0e">VCXO</text>

  <!-- === Signal connections === -->

  <!-- REF → PLL 1 (horizontal) -->
  <line x1="72" y1="74" x2="129" y2="74"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- VCXO → PLL 2 (horizontal, right to left) -->
  <line x1="488" y1="165" x2="321" y2="165"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PLL 1 → PLL 2 (vertical) -->
  <line x1="225" y1="104" x2="225" y2="137"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PLL 2 → horizontal distribution bus -->
  <line x1="225" y1="190" x2="225" y2="205"
        stroke="#475569" stroke-width="1.5"/>
  <line x1="125" y1="205" x2="393" y2="205"
        stroke="#475569" stroke-width="1.5"/>

  <!-- Bus → each divider (vertical drops) -->
  <line x1="125" y1="205" x2="125" y2="217" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="192" y1="205" x2="192" y2="217" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="259" y1="205" x2="259" y2="217" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="326" y1="205" x2="326" y2="217" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="393" y1="205" x2="393" y2="217" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Clock outputs (exit chip bottom, labels below) -->
  <line x1="125" y1="250" x2="125" y2="308" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="125" y="325" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="11" fill="#334155">Clock 0</text>

  <line x1="192" y1="250" x2="192" y2="308" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="192" y="325" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="11" fill="#334155">Clock 1</text>

  <line x1="259" y1="250" x2="259" y2="308" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="259" y="325" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="11" fill="#334155">Clock 2</text>

  <line x1="326" y1="250" x2="326" y2="308" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="326" y="325" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="11" fill="#334155">Clock 3</text>

  <line x1="393" y1="250" x2="393" y2="308" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="393" y="325" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="11" fill="#334155">Clock 4</text>
</svg>
