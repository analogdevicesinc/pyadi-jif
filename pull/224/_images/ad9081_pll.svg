<svg xmlns="http://www.w3.org/2000/svg" width="840" height="480" viewBox="0 0 840 480">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <filter id="sh">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#94a3b8" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="840" height="480" fill="#f8fafc"/>

  <!-- ================================================================ -->
  <!-- PCB boundary lines (dashed)                                       -->
  <!-- ================================================================ -->

  <!-- Top PCB boundary (off-chip filter area) -->
  <line x1="344" y1="118" x2="604" y2="118"
        stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="607" y="115"
        font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">PCB</text>

  <!-- Bottom PCB boundary -->
  <line x1="8" y1="408" x2="812" y2="408"
        stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="795" y="404"
        font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">PCB</text>

  <!-- ================================================================ -->
  <!-- OFF-CHIP FILTER box                                               -->
  <!-- ================================================================ -->

  <rect x="356" y="14" width="134" height="96" rx="8"
        fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" filter="url(#sh)"/>
  <!-- Header band -->
  <path d="M 356 42 L 356 22 Q 356 14 364 14 L 482 14 Q 490 14 490 22 L 490 42 Z"
        fill="#94a3b8"/>
  <text x="423" y="31" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="10" font-weight="700" fill="#ffffff" letter-spacing="0.5">OFF-CHIP FILTER</text>

  <!-- Filter component values -->
  <text x="366" y="58"
        font-family="system-ui,-apple-system,sans-serif" font-size="8.5" fill="#475569">R1=226Ω  C1=22nF</text>
  <text x="366" y="70"
        font-family="system-ui,-apple-system,sans-serif" font-size="8.5" fill="#475569">C2=2.2pF  C3=33nF</text>
  <text x="366" y="82"
        font-family="system-ui,-apple-system,sans-serif" font-size="8.5" fill="#475569">C4=2.2µF</text>

  <!-- VCO pin labels (abbreviated, at filter box bottom) -->
  <text x="380" y="106" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="7" fill="#64748b">FINE</text>
  <text x="402" y="106" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="7" fill="#64748b">VCM</text>
  <text x="428" y="106" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="7" fill="#64748b">COARSE</text>
  <text x="458" y="106" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="7" fill="#64748b">REG</text>

  <!-- Dashed connection lines: filter bottom → VCO top -->
  <line x1="380" y1="110" x2="380" y2="165"
        stroke="#64748b" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="402" y1="110" x2="402" y2="165"
        stroke="#64748b" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="428" y1="110" x2="428" y2="165"
        stroke="#64748b" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="458" y1="110" x2="458" y2="165"
        stroke="#64748b" stroke-width="1.2" stroke-dasharray="3,2"/>
  <!-- Connection dots at VCO top -->
  <circle cx="380" cy="165" r="2.5" fill="#64748b"/>
  <circle cx="402" cy="165" r="2.5" fill="#64748b"/>
  <circle cx="428" cy="165" r="2.5" fill="#64748b"/>
  <circle cx="458" cy="165" r="2.5" fill="#64748b"/>

  <!-- ================================================================ -->
  <!-- MAIN ROW BLOCKS  (center y = 183)                                 -->
  <!-- ================================================================ -->

  <!-- CLOCK RECEIVER (purple) -->
  <rect x="18" y="158" width="95" height="50" rx="8"
        fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5" filter="url(#sh)"/>
  <text x="65" y="178" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="9.5" font-weight="600" fill="#6b21a8">CLOCK</text>
  <text x="65" y="192" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="9.5" font-weight="600" fill="#6b21a8">RECEIVER</text>

  <!-- ÷R (green) -->
  <rect x="130" y="165" width="56" height="36" rx="6"
        fill="#d1fae5" stroke="#10b981" stroke-width="1.5" filter="url(#sh)"/>
  <text x="158" y="186" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#065f46">&#247;R</text>
  <text x="158" y="212" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#475569">R=1,2,3,4</text>

  <!-- PFD (blue) -->
  <rect x="203" y="165" width="50" height="36" rx="6"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="228" y="186" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">PFD</text>

  <!-- CHARGE PUMP (blue) -->
  <rect x="270" y="165" width="78" height="36" rx="6"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="309" y="180" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="9.5" font-weight="600" fill="#1e3a8a">CHARGE</text>
  <text x="309" y="193" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="9.5" font-weight="600" fill="#1e3a8a">PUMP</text>

  <!-- VCO (amber) -->
  <rect x="370" y="165" width="100" height="36" rx="6"
        fill="#fef9c3" stroke="#eab308" stroke-width="1.5" filter="url(#sh)"/>
  <text x="420" y="186" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#854d0e">VCO</text>

  <!-- ÷D (green) -->
  <rect x="488" y="165" width="56" height="36" rx="6"
        fill="#d1fae5" stroke="#10b981" stroke-width="1.5" filter="url(#sh)"/>
  <text x="516" y="186" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#065f46">&#247;D</text>
  <text x="516" y="212" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#475569">D=1,2,3,4</text>

  <!-- PLL BYPASS (blue) -->
  <rect x="562" y="158" width="66" height="50" rx="6"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="595" y="178" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="9.5" font-weight="600" fill="#1e3a8a">PLL</text>
  <text x="595" y="192" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="9.5" font-weight="600" fill="#1e3a8a">BYPASS</text>

  <!-- DIGITAL CLOCK GENERATION (blue) -->
  <rect x="644" y="158" width="95" height="50" rx="8"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="691" y="177" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#1e3a8a">DIGITAL CLOCK</text>
  <text x="691" y="190" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#1e3a8a">GENERATION</text>

  <!-- ================================================================ -->
  <!-- FEEDBACK ROW BLOCKS                                               -->
  <!-- ================================================================ -->

  <!-- ÷M (green) -->
  <rect x="386" y="248" width="68" height="36" rx="6"
        fill="#d1fae5" stroke="#10b981" stroke-width="1.5" filter="url(#sh)"/>
  <text x="420" y="269" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#065f46">&#247;M</text>
  <text x="450" y="296" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#475569">M=11,8,7,5</text>

  <!-- ÷N (green) -->
  <rect x="270" y="248" width="68" height="36" rx="6"
        fill="#d1fae5" stroke="#10b981" stroke-width="1.5" filter="url(#sh)"/>
  <text x="304" y="269" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#065f46">&#247;N</text>
  <text x="328" y="296" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#475569">N=2 TO 50</text>

  <!-- ÷L (green) -->
  <rect x="644" y="294" width="56" height="36" rx="6"
        fill="#d1fae5" stroke="#10b981" stroke-width="1.5" filter="url(#sh)"/>
  <text x="672" y="315" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#065f46">&#247;L</text>
  <text x="672" y="342" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#475569">L=1,2,3,4</text>

  <!-- ================================================================ -->
  <!-- CLOCK DRIVER                                                      -->
  <!-- ================================================================ -->

  <rect x="375" y="338" width="95" height="50" rx="8"
        fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5" filter="url(#sh)"/>
  <text x="422" y="358" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="9.5" font-weight="600" fill="#6b21a8">CLOCK</text>
  <text x="422" y="372" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="9.5" font-weight="600" fill="#6b21a8">DRIVER</text>

  <!-- ================================================================ -->
  <!-- SIGNAL CONNECTIONS                                                -->
  <!-- ================================================================ -->

  <!-- CLOCK_RX → ÷R -->
  <line x1="113" y1="183" x2="129" y2="183"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ÷R → PFD -->
  <line x1="186" y1="183" x2="202" y2="183"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PFD → CHARGE PUMP -->
  <line x1="253" y1="183" x2="269" y2="183"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CHARGE PUMP → VCO -->
  <line x1="348" y1="183" x2="369" y2="183"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- VCO → ÷D (junction dot at VCO right edge for feedback tap) -->
  <circle cx="470" cy="183" r="3.5" fill="#475569"/>
  <line x1="470" y1="183" x2="487" y2="183"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ÷D → PLL BYPASS -->
  <line x1="544" y1="183" x2="561" y2="183"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PLL BYPASS → DIGITAL CLK GEN (upper) -->
  <line x1="628" y1="172" x2="643" y2="172"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DIGITAL CLK GEN → TO INTERNAL DIGITAL BLOCKS -->
  <line x1="739" y1="172" x2="754" y2="172"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="757" y="168"
        font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="500" fill="#334155">TO INTERNAL</text>
  <text x="757" y="180"
        font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="500" fill="#334155">DIGITAL BLOCKS</text>

  <!-- PLL BYPASS → DACCLK (routes below DIGITAL CLK GEN to clear it) -->
  <line x1="628" y1="194" x2="640" y2="194"
        stroke="#475569" stroke-width="1.5"/>
  <line x1="640" y1="194" x2="640" y2="218"
        stroke="#475569" stroke-width="1.5"/>
  <line x1="640" y1="218" x2="754" y2="218"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="757" y="222"
        font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#334155">DACCLK</text>

  <!-- PLL BYPASS bottom → ÷L → ADCCLK -->
  <line x1="595" y1="208" x2="595" y2="312"
        stroke="#475569" stroke-width="1.5"/>
  <line x1="595" y1="312" x2="643" y2="312"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="700" y1="312" x2="754" y2="312"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="757" y="316"
        font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#334155">ADCCLK</text>

  <!-- VCO junction → ÷M tap (down, left, down into ÷M top) -->
  <line x1="470" y1="183" x2="470" y2="237"
        stroke="#475569" stroke-width="1.5"/>
  <line x1="470" y1="237" x2="420" y2="237"
        stroke="#475569" stroke-width="1.5"/>
  <line x1="420" y1="237" x2="420" y2="247"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ÷M → ÷N (horizontal left) -->
  <line x1="386" y1="266" x2="338" y2="266"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ÷N → PFD feedback (down, left, up into PFD bottom) -->
  <line x1="304" y1="284" x2="304" y2="325"
        stroke="#475569" stroke-width="1.5"/>
  <line x1="304" y1="325" x2="228" y2="325"
        stroke="#475569" stroke-width="1.5"/>
  <line x1="228" y1="325" x2="228" y2="202"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CLOCK DRIVER → ÷M bottom input -->
  <line x1="420" y1="338" x2="420" y2="311"
        stroke="#475569" stroke-width="1.5"/>
  <line x1="420" y1="311" x2="420" y2="291"
        stroke="#475569" stroke-width="1.5"/>
  <line x1="420" y1="291" x2="420" y2="285"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ================================================================ -->
  <!-- CLKINP / CLKINN INPUT LINES                                       -->
  <!-- ================================================================ -->

  <!-- CLKINP (x=48) — up through PCB, 100Ω, into CLOCK_RX bottom-left -->
  <line x1="48" y1="460" x2="48" y2="430"
        stroke="#475569" stroke-width="1.5"/>
  <rect x="40" y="418" width="16" height="12" rx="2"
        fill="#ffffff" stroke="#475569" stroke-width="1"/>
  <text x="48" y="427" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="6.5" fill="#475569">100&#937;</text>
  <line x1="48" y1="418" x2="48" y2="208"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="48" y="452" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="8.5" font-weight="500" fill="#334155">CLKINP</text>
  <line x1="48" y1="473" x2="48" y2="463"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CLKINN (x=84) -->
  <line x1="84" y1="460" x2="84" y2="430"
        stroke="#475569" stroke-width="1.5"/>
  <rect x="76" y="418" width="16" height="12" rx="2"
        fill="#ffffff" stroke="#475569" stroke-width="1"/>
  <text x="84" y="427" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="6.5" fill="#475569">100&#937;</text>
  <line x1="84" y1="418" x2="84" y2="208"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="84" y="452" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="8.5" font-weight="500" fill="#334155">CLKINN</text>
  <line x1="84" y1="473" x2="84" y2="463"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ================================================================ -->
  <!-- ADCDRVP / ADCDRVN INPUT LINES                                     -->
  <!-- ================================================================ -->

  <!-- ADCDRVP (x=405) → CLOCK DRIVER bottom -->
  <line x1="405" y1="460" x2="405" y2="430"
        stroke="#475569" stroke-width="1.5"/>
  <rect x="397" y="418" width="16" height="12" rx="2"
        fill="#ffffff" stroke="#475569" stroke-width="1"/>
  <text x="405" y="427" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="6.5" fill="#475569">100&#937;</text>
  <line x1="405" y1="418" x2="405" y2="389"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="405" y="452" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="8.5" font-weight="500" fill="#334155">ADCDRVP</text>
  <line x1="405" y1="473" x2="405" y2="463"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ADCDRVN (x=447) → CLOCK DRIVER bottom -->
  <line x1="447" y1="460" x2="447" y2="430"
        stroke="#475569" stroke-width="1.5"/>
  <rect x="439" y="418" width="16" height="12" rx="2"
        fill="#ffffff" stroke="#475569" stroke-width="1"/>
  <text x="447" y="427" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="6.5" fill="#475569">100&#937;</text>
  <line x1="447" y1="418" x2="447" y2="389"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="447" y="452" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="8.5" font-weight="500" fill="#334155">ADCDRVN</text>
  <line x1="447" y1="473" x2="447" y2="463"
        stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

</svg>
